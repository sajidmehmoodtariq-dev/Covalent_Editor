name: Deploy Covalent to EC2

# This tells GitHub to run this script every time you push code to the 'main' branch
on:
  push:
    branches:
      - master

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      # Step 1: Grab the latest code from your GitHub repo
      - name: Checkout Code
        uses: actions/checkout@v4

      # Step 2: Securely copy the files to your EC2 server
      - name: Copy files via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          # We only copy the exact folders and files Docker needs
          source: "frontend/,backend/,Dockerfile,.dockerignore"
          target: "~/covalent-app"

      # Step 3: SSH into the server and run the Docker commands
      - name: Execute Docker Build & Run
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/covalent-app
            
            echo "Building the new Docker image..."
            docker build -t covalent-app .
            
            echo "Stopping and removing the old container to free Port 80..."
            docker rm -f $(docker ps -aq) 2>/dev/null || true
            
            echo "Booting the new container..."
            docker run -d -p 80:3000 covalent-app
            
            echo "Cleaning up dangling images to save disk space..."
            docker system prune -f